name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Run Native Unit Tests
        run: pio test -e native

  build_and_deploy:
    name: Build and Deploy Firmware
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware
        run: pio run -e esp32-c6-devkitc-1

      - name: Generate version.json metadata
        run: |
          VERSION=$(grep "FIRMWARE_VERSION =" src/SmartBoxController.h | head -n 1 | sed -e 's/.*"\(.*\)".*/\1/')
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "{\"version\": \"$VERSION\", \"build_number\": \"${{ github.run_id }}\", \"commit\": \"${{ github.sha }}\", \"date\": \"$BUILD_DATE\"}" > .pio/build/esp32-c6-devkitc-1/version.json
          cat .pio/build/esp32-c6-devkitc-1/version.json

      - name: Debug SFTP Connection and Paths
        env:
          NAS_HOST: ${{ secrets.NAS_HOST }}
          NAS_PORT: ${{ secrets.NAS_PORT }}
          NAS_USER: ${{ secrets.NAS_USER }}
          NAS_PASSWORD: ${{ secrets.NAS_PASSWORD }}
          NAS_TARGET_DIR: ${{ secrets.NAS_TARGET_DIR }}
        run: |
          pip install paramiko
          cat << 'EOF' > sftp_debug.py
          import os
          import paramiko
          
          host = os.environ["NAS_HOST"]
          port = int(os.environ["NAS_PORT"])
          username = os.environ["NAS_USER"]
          password = os.environ["NAS_PASSWORD"]
          target_dir = os.environ["NAS_TARGET_DIR"]
          
          print(f"Target dir configured length: {len(target_dir)}")
          
          client = paramiko.SSHClient()
          client.set_missing_host_key_policy(paramiko.AutoAddPolicy())
          try:
              client.connect(host, port=port, username=username, password=password)
              print("SSH connection successful.")
          except Exception as e:
              print(f"SSH connection failed: {e}")
              exit(1)
              
          sftp = client.open_sftp()
          print(f"Current SFTP working directory: {sftp.normalize('.')}")
          
          print("Checking target_dir path...")
          try:
              stat_info = sftp.stat(target_dir)
              print(f"Stat target_dir: {stat_info}")
              print(f"List target_dir: {sftp.listdir(target_dir)}")
          except Exception as e:
              print(f"Failed to stat/list target_dir: {e}")
              
          print("\nWalking remote directory structure:")
          def walk(path, depth=0):
              if depth > 4:
                  return
              try:
                  for entry in sftp.listdir_attr(path):
                      name = entry.filename
                      full_path = (path + "/" + name).replace("//", "/")
                      is_dir = (entry.st_mode & 0o040000) != 0
                      prefix = "  " * depth
                      if is_dir:
                          print(f"{prefix}[DIR]  {full_path}")
                          walk(full_path, depth + 1)
                      else:
                          print(f"{prefix}[FILE] {full_path} ({entry.st_size} bytes)")
              except Exception as e:
                  print(f"{'  ' * depth}Error walking {path}: {e}")
                  
          walk(".")
          sftp.close()
          client.close()
          EOF
          python sftp_debug.py

      - name: Deploy to Synology NAS via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          password: ${{ secrets.NAS_PASSWORD }}
          port: ${{ secrets.NAS_PORT }}
          local_path: './.pio/build/esp32-c6-devkitc-1/'
          remote_path: ${{ secrets.NAS_TARGET_DIR }}
          sftp_only: true
          file_filter: 'firmware.bin,version.json'
