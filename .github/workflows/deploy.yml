name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create secrets.h placeholder for testing
        run: cp include/secrets.h.example include/secrets.h

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Run Native Unit Tests
        run: pio test -e native

  build_and_deploy:
    name: Build and Deploy Firmware
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create secrets.h from GitHub Secrets
        env:
          SECRET_ROOT_CA_CERT: ${{ secrets.SECRET_ROOT_CA_CERT }}
        run: |
          cat <<'HEREDOC' > include/secrets.h
          #ifndef SECRETS_H
          #define SECRETS_H
          HEREDOC

          # Append single-line secrets
          cat <<EOF >> include/secrets.h
          #define SECRET_WIFI_SSID "${{ secrets.SECRET_WIFI_SSID }}"
          #define SECRET_WIFI_PASS "${{ secrets.SECRET_WIFI_PASS }}"
          #define SECRET_AP_PASS "${{ secrets.SECRET_AP_PASS }}"
          #define SECRET_VERSION_URL "${{ secrets.SECRET_VERSION_URL }}"
          #define SECRET_FIRMWARE_URL "${{ secrets.SECRET_FIRMWARE_URL }}"
          #define SECRET_MQTT_HOST "${{ secrets.SECRET_MQTT_HOST }}"
          #define SECRET_MQTT_PORT ${{ secrets.SECRET_MQTT_PORT }}
          #define SECRET_MQTT_USER "${{ secrets.SECRET_MQTT_USER }}"
          #define SECRET_MQTT_PASS "${{ secrets.SECRET_MQTT_PASS }}"
          EOF

          # Append multi-line Root CA cert using env variable (safe for PEM newlines)
          printf '#define SECRET_ROOT_CA_CERT R"(\n%s\n)"\n' "${SECRET_ROOT_CA_CERT}" >> include/secrets.h

          # Close header guard
          echo '#endif // SECRETS_H' >> include/secrets.h

          echo "[CI] include/secrets.h generated successfully."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware
        run: |
          BASE_VERSION=$(grep 'FIRMWARE_VERSION = "' src/SmartBoxController.h | sed -e 's/.*"\(.*\)".*/\1/')
          SHORT_SHA=$(git rev-parse --short HEAD)
          FULL_VERSION="${BASE_VERSION}-g${SHORT_SHA}"
          echo "FULL_VERSION=${FULL_VERSION}" >> $GITHUB_ENV
          echo "Building version: ${FULL_VERSION}"
          PLATFORMIO_BUILD_FLAGS="-DFIRMWARE_VERSION_OVERRIDE=\"\\\"${FULL_VERSION}\\\"\"" pio run -e esp32-c6-devkitc-1

      - name: Generate version.json metadata
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "{\"version\": \"${{ env.FULL_VERSION }}\", \"build_number\": \"${{ github.run_id }}\", \"commit\": \"${{ github.sha }}\", \"date\": \"$BUILD_DATE\"}" > .pio/build/esp32-c6-devkitc-1/version.json
          cat .pio/build/esp32-c6-devkitc-1/version.json

      - name: Prepare deployment directory
        run: |
          mkdir -p dist
          cp .pio/build/esp32-c6-devkitc-1/firmware.bin dist/
          cp .pio/build/esp32-c6-devkitc-1/version.json dist/
          ls -la dist/

      - name: Deploy to Synology NAS via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          password: ${{ secrets.NAS_PASSWORD }}
          port: ${{ secrets.NAS_PORT }}
          local_path: './dist/*'
          remote_path: ${{ secrets.NAS_TARGET_DIR }}
          sftp_only: true
