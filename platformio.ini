[env:esp32-c6-devkitc-1]
; 공식 안정화 버전 대신, ESP32-C6와 Arduino 3.x를 완벽 지원하는 포크(Fork) 저장소를 직접 당겨옵니다.
platform = https://github.com/pioarduino/platform-espressif32.git
board = esp32-c6-devkitc-1
framework = arduino
extra_scripts = pre:scripts/git_version.py

; 시리얼 모니터 통신 속도
monitor_speed = 115200

; 컴파일 시 찌꺼기 에러를 방지하는 옵션
board_build.flash_mode = qio
board_build.partitions = default_16MB.csv


; 라이브러리 의존성 추가
lib_deps = 
    adafruit/Adafruit INA219 @ ^1.2.3
    Wire
    https://github.com/mathieucarbou/AsyncTCP.git
    https://github.com/mathieucarbou/ESPAsyncWebServer.git
    tobiasschuerg/ESP8266 Influxdb @ ^3.13.0
    marvinroger/AsyncMqttClient @ ^0.9.0
    bblanchon/ArduinoJson @ ^7.0.4
lib_ignore = WebServer

[env:esp32-c6-test]
platform = https://github.com/pioarduino/platform-espressif32.git
board = esp32-c6-devkitc-1
framework = arduino
extra_scripts = pre:scripts/git_version.py
monitor_speed = 115200
board_build.flash_mode = qio
board_build.partitions = default_16MB.csv

lib_deps = 
    adafruit/Adafruit INA219 @ ^1.2.3
    Wire
    https://github.com/mathieucarbou/AsyncTCP.git
    https://github.com/mathieucarbou/ESPAsyncWebServer.git
    tobiasschuerg/ESP8266 Influxdb @ ^3.13.0
    marvinroger/AsyncMqttClient @ ^0.9.0
    bblanchon/ArduinoJson @ ^7.0.4
lib_ignore = WebServer
test_build_src = yes
build_flags = -DTARGET_TEST
build_src_filter = 
    +<*>
    -<main.cpp>
    -<ConfigManager.cpp>
    -<WifiManager.cpp>

    -<WebDashboard.cpp>
    -<AutoOtaManager.cpp>
    -<TelemetryManager.cpp>
    -<PowerManager.cpp>
    -<RemoteLogger.cpp>

[env:native]
platform = native
build_flags = -DNATIVE_BUILD
test_build_src = yes
build_src_filter = 
    +<*>
    -<main.cpp>
    -<ConfigManager.cpp>
    -<WifiManager.cpp>

    -<WebDashboard.cpp>
    -<Esp32Hardware.cpp>
    -<AutoOtaManager.cpp>
    -<TelemetryManager.cpp>
    -<PowerManager.cpp>
    -<RemoteLogger.cpp>


