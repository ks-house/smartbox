[env:esp32-c6-devkitc-1]
; 공식 안정화 버전 대신, ESP32-C6와 Arduino 3.x를 완벽 지원하는 포크(Fork) 저장소를 직접 당겨옵니다.
platform = https://github.com/pioarduino/platform-espressif32.git
board = esp32-c6-devkitc-1
framework = arduino

; 시리얼 모니터 통신 속도
monitor_speed = 115200

; 컴파일 시 찌꺼기 에러를 방지하는 옵션
board_build.flash_mode = qio
upload_port = COM4

; 라이브러리 의존성 추가
lib_deps = 
    adafruit/Adafruit INA219 @ ^1.2.3
    Wire

[env:native]
platform = native
build_flags = -std=gnu++11 -DNATIVE_BUILD
src_filter = 
    +<*>
    -<main.cpp>
    -<Esp32Hardware.cpp>
    -<ConfigManager.cpp>
    -<WifiManager.cpp>
    -<SmartThingsReporter.cpp>
    -<WebDashboard.cpp>
